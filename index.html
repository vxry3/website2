<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Name | Developer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="cursor"></div>

<!-- NAV -->
<nav class="nav">
  <h2>YN</h2>
  <div>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1 class="hidden">I build modern web experiences</h1>
  <p class="hidden">Clean UI • Smooth animations • Real performance</p>
  <a href="#projects" class="btn hidden">See Projects</a>
</section>

<!-- PROJECTS -->
<section id="projects" class="section">
  <h2 class="hidden">My Projects</h2>

  <!-- filter buttons -->
  <div class="filters hidden">
    <button onclick="filterRepos('all')">All</button>
    <button onclick="filterRepos('JavaScript')">JavaScript</button>
    <button onclick="filterRepos('HTML')">HTML</button>
  </div>

  <div id="repo-container" class="grid"></div>
</section>

<!-- CONTACT -->
<section id="contact" class="section contact">
  <h2 class="hidden">Contact Me</h2>

  <div class="contact-grid">
    
    <div class="contact-card hidden">
      <h3>Email</h3>
      <p>you@email.com</p>
      <a href="mailto:you@email.com">Send Email</a>
    </div>

    <div class="contact-card hidden">
      <h3>GitHub</h3>
      <p>github.com/yourusername</p>
      <a href="https://github.com/yourusername" target="_blank">View Profile</a>
    </div>

    <div class="contact-card hidden">
      <h3>LinkedIn</h3>
      <p>Your Profile</p>
      <a href="#">Connect</a>
    </div>

  </div>
</section>

<footer class="hidden">
  <p>© 2026 Your Name</p>
</footer>

<script src="script.js"></script>
</body>
</html>
